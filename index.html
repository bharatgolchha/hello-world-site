<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World in Full Color!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-1: #ff007f;
            --color-2: #7f00ff;
            --color-3: #00f0ff;
            --color-4: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, var(--color-1), var(--color-2), var(--color-3), var(--color-4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: #ffffff;
            transition: background 1s ease;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .palette-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .themes {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .theme-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 18px;
            border-radius: 30px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .theme-btn:hover {
            background: #ffffff;
            color: #111111;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .theme-btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World!</h1>
        <p>Welcome to your vibrant, multi-colored playground. Click on any theme below to dynamically shift the mood of your website!</p>
        
        <div class="palette-title">Choose Your Vibe</div>
        <div class="themes">
            <button class="theme-btn" onclick="setTheme('#ff007f', '#7f00ff', '#00f0ff', '#ffaa00')">Cosmic Sunset</button>
            <button class="theme-btn" onclick="setTheme('#00f2fe', '#4facfe', '#0f2027', '#203a43')">Deep Ocean</button>
            <button class="theme-btn" onclick="setTheme('#ff0844', '#ffb199', '#f35588', '#f81f01')">Sweet Cherry</button>
            <button class="theme-btn" onclick="setTheme('#11998e', '#38ef7d', '#a8ff78', '#78e08f')">Aurora Green</button>
            <button class="theme-btn" onclick="setTheme('#8a2387', '#e94057', '#f27121', '#ff007f')">Cyberpunk</button>
        </div>

        <div class="footer">
            Built with ❤️ by <a href="https://springbase.ai" target="_blank">springbase.ai</a>
        </div>
    </div>

    <script>
        function setTheme(c1, c2, c3, c4) {
            document.documentElement.style.setProperty('--color-1', c1);
            document.documentElement.style.setProperty('--color-2', c2);
            document.documentElement.style.setProperty('--color-3', c3);
            document.documentElement.style.setProperty('--color-4', c4);
        }
    </script>
</body>
</html>
